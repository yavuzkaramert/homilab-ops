name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Sadece main branch'ine push olunca çalışır.

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/hello-world/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          # Kullanıcı adını ve imaj adını buraya yaz (Örn: username/homelab-app)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/homelab-hello-world:latest
          # Cache kullanarak build sürelerini kısaltalım
          cache-from: type=gha
          cache-to: type=gha,mode=max