apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-homilab
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-homilab
  template:
    metadata:
      labels:
        app: hello-homilab
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80